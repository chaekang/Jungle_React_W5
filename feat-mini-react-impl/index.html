<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini React - Todo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #fff8f3; max-width: 1320px; margin: 24px auto; padding: 0 20px 40px; color: #3f3027; }
      h1 { text-align: center; margin-bottom: 24px; font-size: 2rem; color: #d46a57; }
      .app-shell { background: white; border-radius: 20px; padding: 28px 24px; box-shadow: 0 18px 40px rgba(176, 112, 86, 0.12); }
      .todo-input { display: flex; gap: 8px; margin-bottom: 16px; }
      .todo-input input { flex: 1; padding: 8px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; }
      .todo-input button { padding: 8px 16px; font-size: 1rem; background: #e88; color: white; border: none; border-radius: 4px; cursor: pointer; }
      .demo-counter { margin-bottom: 14px; padding: 10px 14px; border-radius: 10px; background: #fff2dd; color: #8a5a1f; font-size: 0.95rem; }
      .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; }
      .filter-bar button { padding: 8px 12px; border: 1px solid #f0b8ab; border-radius: 999px; background: #fff1ec; color: #9a5949; cursor: pointer; }
      .filter-bar button.active { background: #d46a57; color: white; border-color: #d46a57; }
      .todo-stage { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(300px, 0.9fr); gap: 18px; align-items: start; }
      .todo-column { min-width: 0; }
      .todo-list { list-style: none; }
      .todo-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 1px solid #f2ddd6; border-radius: 14px; margin-bottom: 10px; background: #fffdfa; cursor: pointer; transition: background 0.15s ease, transform 0.15s ease; }
      .todo-item:hover { background: #fff4ef; transform: translateY(-1px); }
      .todo-item.done { background: #fff0eb; }
      .todo-item.inspected { border-color: #d46a57; box-shadow: 0 0 0 2px rgba(212, 106, 87, 0.12); }
      .todo-toggle { display: flex; align-items: center; }
      .todo-toggle input { width: 18px; height: 18px; }
      .todo-item span { flex: 1; cursor: pointer; }
      .todo-item span.completed { text-decoration: line-through; color: #aaa; }
      .todo-props-badge { padding: 4px 8px; border-radius: 999px; background: #fff1ec; color: #a45847; font-size: 0.72rem; white-space: nowrap; }
      .todo-edit-input { flex: 1; padding: 8px 10px; border: 1px solid #e4c3ba; border-radius: 8px; font-size: 0.95rem; }
      .todo-actions { display: flex; gap: 8px; }
      .todo-edit-actions { display: flex; gap: 8px; }
      .todo-item button { padding: 6px 10px; font-size: 0.8rem; background: #f66; color: white; border: none; border-radius: 6px; cursor: pointer; }
      .todo-item button.ghost { background: #ffe6df; color: #a45847; }
      .todo-footer { margin-top: 12px; color: #888; font-size: 0.9rem; }
      .event-log-panel { position: sticky; top: 20px; background: #fff7f1; border: 1px solid #f0d6cb; border-radius: 16px; padding: 16px; }
      .event-log-panel h3 { margin-bottom: 8px; color: #a45847; font-size: 1rem; }
      .event-log-panel p { margin-bottom: 12px; color: #8e7369; font-size: 0.88rem; line-height: 1.4; }
      .event-section-title { display: block; margin-bottom: 4px; color: #7d4a3d; font-size: 0.92rem; }
      .event-inline-text { display: block; margin-bottom: 4px; color: #8e7369; font-size: 0.84rem; }
      .event-log-panel code { color: #a45847; font-size: 0.82rem; }
      .stateless-badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
      .stateless-badge { display: inline-flex; align-items: center; padding: 5px 9px; border-radius: 999px; font-size: 0.76rem; font-weight: 600; }
      .stateless-badge.off { background: #ffe6df; color: #a45847; }
      .compact-proof-text { margin-bottom: 0 !important; color: #6f564d !important; font-size: 0.82rem !important; line-height: 1.45; }
      .event-code-block { max-height: 150px; overflow: auto; margin: 6px 0; padding: 8px 10px; border-radius: 10px; background: #2d2421; color: #f7e6db; font-size: 0.78rem; line-height: 1.45; white-space: pre-wrap; }
      .props-flow-note { margin-bottom: 0 !important; color: #7f5f53 !important; font-size: 0.8rem !important; }
      .event-log-list { display: grid; gap: 10px; max-height: 420px; overflow: auto; }
      .event-log-item { padding: 8px 0; border-bottom: 1px solid #f2dfd7; color: #5f4b43; font-size: 0.86rem; line-height: 1.45; }
      .event-log-item:last-child { border-bottom: none; }
      .hook-debug { margin-top: 24px; padding: 16px; border-radius: 14px; background: #2a211e; color: #f6e8df; }
      .hook-debug h2 { margin-bottom: 8px; font-size: 1.1rem; }
      .hook-debug p { margin-bottom: 10px; color: #d8c1b5; font-size: 0.9rem; }
      .hook-debug-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; }
      .hook-panel { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; }
      .resizable-panel { resize: both; overflow: auto; min-width: 260px; min-height: 220px; }
      .hook-panel h3 { margin-bottom: 10px; font-size: 0.95rem; }
      .hook-stack { display: grid; grid-template-rows: minmax(0, 1fr) minmax(0, 0.95fr); gap: 10px; height: 100%; min-height: 360px; }
      .hook-split { min-height: 0; padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.05); overflow: hidden; display: flex; flex-direction: column; }
      .hook-split.bottom h4 { margin-bottom: 8px; color: #ffd9c8; font-size: 0.86rem; }
      .hook-debug pre { margin: 0; min-height: 0; height: 100%; overflow: auto; font-size: 0.83rem; line-height: 1.45; white-space: pre-wrap; padding-right: 8px; }
      .easy-hook-list { display: grid; gap: 10px; min-height: 0; height: 100%; overflow: auto; padding-right: 4px; }
      .easy-hook-card { display: grid; gap: 4px; padding: 10px 12px; border-radius: 10px; background: rgba(255,255,255,0.08); }
      .easy-hook-card strong { color: #ffd9c8; font-size: 0.88rem; }
      .easy-hook-card span { color: #f6e8df; font-size: 0.88rem; }
      .easy-hook-card code { color: #ffe39f; font-size: 0.82rem; word-break: break-word; }
      @media (max-width: 960px) { .todo-stage { grid-template-columns: 1fr; } .event-log-panel { position: static; } }
      @media (max-width: 720px) { .hook-debug-grid { grid-template-columns: 1fr; } .resizable-panel { min-width: 100%; } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
